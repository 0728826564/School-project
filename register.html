<!DOCTYPE html>
<head>
    <title>Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <form id="formm" method="post" action="register.php">
        <h1>Kenya Power and Lightening Company</h1>
        <div class="wrapper">
            <h2>Register</h2>
            <label for="username" class="lbl">Name</label><br>
            <input type="text" id="username" name="username" class="input-box"><br>
            <label for="email" class="lbl">Email</label><br>
            <input type="email" id="email" name="email" class="input-box"><br>
            <label for="age" class="age">Age</label><br>
            <input type="number" id="age" name="age" class="input-box"><br>
            <label for="password" class="pass">Password</label><br>
            <input type="password" id="password" name="password" class="input-box"><br>
            <input type="checkbox" class="terms" name="terms" id="terms">
            <label for="terms" class="lbs">Please accept the terms and conditions to continue.</label><br>
            <p id="error"></p><br>
            <button type="submit" id="submit" class="reg">Register</button><br>
            <p2>Already have an account?<a href="login.html" target="_blank">Login.</a></p2>
        </div>
    </form>
    <script src="register.js"></script>
</body>
</head>
</html>
